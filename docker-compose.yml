version: "3.9"

networks:
  craft-net:
    driver: bridge

volumes:
  auth-db-data:
  profile-db-data:
  cv-db-data:
  redis-data:
  rabbitmq-data:

services:
  # ─── Infrastructure ───────────────────────────────────────────
  auth-db:
    image: mongo:7
    container_name: auth-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: auth
    volumes:
      - auth-db-data:/data/db
    networks:
      - craft-net

  profile-db:
    image: mongo:7
    container_name: profile-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: profiles
    volumes:
      - profile-db-data:/data/db
    networks:
      - craft-net

  cv-db:
    image: mongo:7
    container_name: cv-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: cvs
    volumes:
      - cv-db-data:/data/db
    networks:
      - craft-net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - craft-net
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-rabbitpass}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - craft-net

  # ─── Microservices ────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      MONGO_URI: mongodb://root:${MONGO_ROOT_PASSWORD:-secret}@auth-db:27017/auth?authSource=admin
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASS:-rabbitpass}@rabbitmq:5672
      BCRYPT_ROUNDS: 12
    depends_on:
      - auth-db
      - redis
      - rabbitmq
    networks:
      - craft-net

  user-profile-service:
    build:
      context: .
      dockerfile: services/user-profile-service/Dockerfile
    container_name: user-profile-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3002
      MONGO_URI: mongodb://root:${MONGO_ROOT_PASSWORD:-secret}@profile-db:27017/profiles?authSource=admin
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASS:-rabbitpass}@rabbitmq:5672
    depends_on:
      - profile-db
      - redis
      - rabbitmq
    networks:
      - craft-net

  cv-service:
    build:
      context: .
      dockerfile: services/cv-service/Dockerfile
    container_name: cv-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3003
      MONGO_URI: mongodb://root:${MONGO_ROOT_PASSWORD:-secret}@cv-db:27017/cvs?authSource=admin
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASS:-rabbitpass}@rabbitmq:5672
    depends_on:
      - cv-db
      - redis
      - rabbitmq
    networks:
      - craft-net

  document-service:
    build:
      context: .
      dockerfile: services/document-service/Dockerfile
    container_name: document-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3004
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASS:-rabbitpass}@rabbitmq:5672
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    depends_on:
      - rabbitmq
    networks:
      - craft-net
    # Puppeteer needs these
    cap_add:
      - SYS_ADMIN
    shm_size: "2gb"

  ats-service:
    build:
      context: .
      dockerfile: services/ats-service/Dockerfile
    container_name: ats-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3005
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    depends_on:
      - redis
    networks:
      - craft-net

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: ai-service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3006
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    depends_on:
      - redis
    networks:
      - craft-net

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      AUTH_SERVICE_URL: http://auth-service:3001
      PROFILE_SERVICE_URL: http://user-profile-service:3002
      CV_SERVICE_URL: http://cv-service:3003
      DOCUMENT_SERVICE_URL: http://document-service:3004
      ATS_SERVICE_URL: http://ats-service:3005
      AI_SERVICE_URL: http://ai-service:3006
    depends_on:
      - auth-service
      - user-profile-service
      - cv-service
      - document-service
      - ats-service
      - ai-service
    networks:
      - craft-net

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api-gateway
    networks:
      - craft-net
