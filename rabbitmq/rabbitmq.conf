## RabbitMQ configuration for craft-your-career

# ─── Networking ───────────────────────────────────────────────
listeners.tcp.default = 5672

# ─── Management UI ────────────────────────────────────────────
management.tcp.port = 15672

# ─── Resource limits ──────────────────────────────────────────
vm_memory_high_watermark.relative = 0.6
disk_free_limit.relative = 1.5

# ─── Message TTL defaults ─────────────────────────────────────
# Messages older than 24h in any queue expire
# (individual queues can override this)

# ─── Heartbeat ────────────────────────────────────────────────
heartbeat = 60

# ─── Logging ──────────────────────────────────────────────────
log.console = true
log.console.level = info
